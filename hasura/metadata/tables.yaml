- table:
    schema: public
    name: logs
- table:
    schema: public
    name: profiles
  object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
      - user_id
      - first_name
      - middle_name
      - last_name
      - date_of_birth
      - gender
      - biography
      - avatar
      backend_only: false
  select_permissions:
  - role: user
    permission:
      columns:
      - date_of_birth
      - gender
      - user_id
      - biography
      - avatar
      - first_name
      - last_name
      - middle_name
      filter:
        user_id:
          _eq: X-Hasura-User-Id
  update_permissions:
  - role: user
    permission:
      columns:
      - date_of_birth
      - gender
      - user_id
      - biography
      - avatar
      - first_name
      - last_name
      - middle_name
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
  delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
- table:
    schema: public
    name: user_sessions
  object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
- table:
    schema: public
    name: users
  object_relationships:
  - name: profile
    using:
      manual_configuration:
        remote_table:
          schema: public
          name: profiles
        column_mapping:
          id: user_id
  array_relationships:
  - name: profiles
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          schema: public
          name: profiles
  - name: user_sessions
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          schema: public
          name: user_sessions
  insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
      - id
      - username
      - email
      - phone
      - password
      - role
      - status
      - secret_token
      - created_at
      - updated_at
      - last_seen_at
      backend_only: false
  select_permissions:
  - role: user
    permission:
      columns:
      - email
      - id
      - last_seen_at
      - phone
      - role
      - status
      - username
      filter:
        id:
          _eq: X-Hasura-User-Id
  update_permissions:
  - role: user
    permission:
      columns:
      - status
      - id
      - created_at
      - last_seen_at
      - updated_at
      - email
      - password
      - phone
      - role
      - secret_token
      - username
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: {}
  delete_permissions:
  - role: user
    permission:
      filter:
        id:
          _eq: X-Hasura-User-Id
